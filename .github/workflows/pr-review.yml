name: PR Review Agent

# SECURITY MODEL
# --------------
# This workflow runs on `pull_request_target`, which gives it write access to
# the repo and access to secrets. PRs from forks are untrusted — anyone can
# open one. To prevent a malicious PR from rewriting agent code and stealing
# our token bag, this workflow MUST NEVER execute code that came from the PR.
#
# Specifically:
#   - We check out `main` (not the PR ref).
#   - We pull the diff via `gh api` as data, not via `git checkout` into the
#     workspace. The diff lands in a file the agent reads as untrusted text.
#   - `npm ci` runs against `main`'s lockfile only.
#
# Do not add a `git checkout refs/pull/.../head` step here, and do not let
# the agent's tools open files outside of `scripts/agents/`. See
# scripts/agents/src/validation/safety-checker.ts.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    # Skip PRs targeting the v2 integration branch — the v2 rewrite is
    # tracked as a series of internal PRs that merge into v2, and only
    # the final v2 -> main PR needs agent review.
    branches-ignore:
      - v2
    paths-ignore:
      - '.github/workflows/**'
      - '**.md'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        type: number
        required: true
      focus_areas:
        description: 'Focus areas (comma-separated: security,performance,logic,tests,style)'
        type: string
        default: 'security,logic,tests'
      suggest_tests:
        description: 'Suggest tests for untested code'
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  review-pr:
    runs-on: ubuntu-latest
    environment: jira-mcp
    # Skip our own bots so we don't review-loop on auto-merge / dependabot.
    if: github.actor != 'github-actions[bot]' && github.actor != 'dependabot[bot]'

    steps:
      # Always check out main. Never the PR. The PR's contents are pulled in
      # later as a diff file — data, not executable code.
      - name: Checkout main (never the PR)
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (from main)
        run: npm ci

      - name: Install agent dependencies (from main)
        run: cd scripts/agents && npm ci

      - name: Determine PR Number
        id: pr-number
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Check PR state
        id: pr-state
        run: |
          PR_STATE=$(gh pr view "${{ steps.pr-number.outputs.pr_number }}" --json state --jq .state)
          echo "state=$PR_STATE" >> $GITHUB_OUTPUT
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "PR is $PR_STATE, skipping review"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Fetch the diff via the GitHub API as data. We never `git checkout` the
      # PR ref into the workspace.
      - name: Fetch PR diff as data
        if: steps.pr-state.outputs.state == 'OPEN'
        run: |
          gh api \
            -H "Accept: application/vnd.github.v3.diff" \
            "/repos/${{ github.repository }}/pulls/${{ steps.pr-number.outputs.pr_number }}" \
            > pr-diff.patch
          echo "Diff size: $(wc -c < pr-diff.patch) bytes"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run PR Review Agent (from main)
        if: steps.pr-state.outputs.state == 'OPEN'
        id: pr-review-agent
        run: npx tsx scripts/agents/src/agents/pr-review-agent.ts
        env:
          # PAT_TOKEN allows APPROVE/REQUEST_CHANGES (GITHUB_TOKEN can't approve)
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr-number.outputs.pr_number }}
          PR_DIFF_FILE: pr-diff.patch
          FOCUS_AREAS: ${{ inputs.focus_areas || 'security,logic,tests' }}
          SUGGEST_TESTS: ${{ inputs.suggest_tests || 'true' }}
          # AI Provider API Keys — router uses the first available.
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          USE_GITHUB_MODELS: ${{ vars.USE_GITHUB_MODELS || 'true' }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4o' }}

      - name: Post summary
        if: always()
        run: |
          echo "## PR Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.pr-state.outputs.state }}" != "OPEN" ]; then
            echo "PR #${{ steps.pr-number.outputs.pr_number }} is ${{ steps.pr-state.outputs.state }}, review skipped." >> $GITHUB_STEP_SUMMARY
          else
            echo "The PR Review Agent has completed analyzing PR #${{ steps.pr-number.outputs.pr_number }}." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Configuration" >> $GITHUB_STEP_SUMMARY
            echo "- PR Number: #${{ steps.pr-number.outputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
            echo "- Focus Areas: ${{ inputs.focus_areas || 'security,logic,tests' }}" >> $GITHUB_STEP_SUMMARY
            echo "- Suggest Tests: ${{ inputs.suggest_tests || 'true' }}" >> $GITHUB_STEP_SUMMARY
          fi
