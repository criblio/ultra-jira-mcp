name: Dependabot Auto-Merge

# SECURITY MODEL
# --------------
# This workflow runs on `pull_request_target` (privileged context). It is
# scoped strictly to:
#   - PRs authored by `dependabot[bot]`
#   - PRs from the same repository (not forks)
# Both conditions are enforced in the job-level `if` below; do not relax.
#
# We DO check out the PR's code so we can run `npm ci`/`npm test` against it,
# which is necessary to know whether the bump is safe. To mitigate the
# residual risk that a dependency under update ships a malicious postinstall
# script:
#   1. We only auto-merge patch and minor bumps (`update-type` check below).
#   2. Major bumps fail CI here and require a human reviewer. We do not run
#      the LLM-driven `bug-fix-agent.ts` on a Dependabot PR — running an
#      agent off PR code in a privileged context is an RCE pattern.
#
# Together this gives Dependabot enough autonomy to keep deps current while
# leaving every code-modifying step under human review.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '.github/workflows/**'
      - '**.md'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test and merge'
        type: number
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-merge:
    runs-on: ubuntu-latest
    environment: jira-mcp
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.user.login == 'dependabot[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Get PR info
        id: pr-info
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Use Dependabot's metadata action to extract update-type. This is the
      # canonical pattern for restricting auto-merge by semver scope.
      - name: Dependabot metadata
        if: github.event_name == 'pull_request_target'
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse major version bumps
        if: >-
          github.event_name == 'pull_request_target' &&
          steps.dependabot-metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo "::error::Major version bump detected. Auto-merge refused; a human reviewer must validate."
          gh pr comment "${{ steps.pr-info.outputs.pr_number }}" --body \
            "Major version bump detected for \`${{ steps.dependabot-metadata.outputs.dependency-names }}\`. Auto-merge is disabled for major bumps — please review manually."
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ steps.pr-info.outputs.pr_number }}/head
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Enable auto-merge
        if: success()
        run: gh pr merge --auto --squash "${{ steps.pr-info.outputs.pr_number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        if: success()
        run: gh pr review --approve "${{ steps.pr-info.outputs.pr_number }}"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
